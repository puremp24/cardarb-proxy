// eBay Sports Cards (cat 212) fees:
//   Final Value Fee: 13.25% on first $7,500 + $0.30 per order
//   Promoted listings optional — not included
// Shipping: buyer pays, but we add estimated $5 for PWE/bubble mailer on cheap cards
//           and $10 for tracked package on cards >$50
const EBAY_FVF_RATE    = 0.1325;  // 13.25% final value fee for sports cards
const EBAY_ORDER_FEE   = 0.30;    // $0.30 per transaction
const PAYPAL_GONE      = true;    // eBay managed payments, no extra PayPal fee

function calcROI(salePrice, buyCost, buyShipping) {
  // Total cost to acquire the card
  const totalCost = buyCost + (buyShipping || 0);

  // eBay fees on the sale
  const fvf      = salePrice * EBAY_FVF_RATE;
  const orderFee = EBAY_ORDER_FEE;
  const totalFees = fvf + orderFee;

  // Estimated shipping cost to sell (you ship it out)
  // Use actual listing shipping if available, else estimate
  const sellShipping = salePrice > 50 ? 10 : 5;

  // Net proceeds after all costs
  const net    = salePrice - totalFees - sellShipping;
  const profit = net - totalCost;
  const roi    = profit / totalCost;

  return { net, profit, roi, totalFees, sellShipping, totalCost };
}

const f$   = n  => `$${Number(n).toFixed(2)}`;
const fR   = r  => `${r>=0?"+":""}${(r*100).toFixed(1)}%`;
const slp  = ms => new Promise(r=>setTimeout(r,ms));
const ROI_MIN  = 0.10;

async function ping() {
  try { const r=await fetch(`${PROXY}/ping`,{signal:AbortSignal.timeout(6000)}); return r.ok; }
  catch { return false; }
}

async function scanTarget(t) {
  const r = await fetch(`${PROXY}/scan?binQ=${encodeURIComponent(t.binQ)}&soldQ=${encodeURIComponent(t.soldQ)}&maxPrice=${t.maxBuy}`);
  if (!r.ok) throw new Error("proxy "+r.status);
  return r.json();
}

async function scanOffer(t) {
  const r = await fetch(`${PROXY}/scan-offer?binQ=${encodeURIComponent(t.binQ)}&soldQ=${encodeURIComponent(t.soldQ)}&maxPrice=${t.maxBuy}`);
  if (!r.ok) throw new Error("proxy "+r.status);
  return r.json();
}

async function scanAuction(t) {
  const r = await fetch(`${PROXY}/scan-auction?binQ=${encodeURIComponent(t.binQ)}&soldQ=${encodeURIComponent(t.soldQ)}&maxPrice=${t.maxBuy}`);
  if (!r.ok) throw new Error("proxy "+r.status);
  return r.json();
}

function App() {
  const [deals,      setDeals]      = useState([]);
  const [auctions,   setAuctions]   = useState([]);
  const [bestOffers, setBestOffers] = useState([]);
  const [scanning, setScanning] = useState(false);
  const [log,      setLog]      = useState([]);
  const [notifs,   setNotifs]   = useState([]);
  const [tab,      setTab]      = useState("all");
  const [roiMin,   setRoiMin]   = useState(0);
  const [lastScan, setLastScan] = useState(null);
  const [proxyOk,  setProxyOk]  = useState(null);
  const [auto,     setAuto]     = useState(false);
  const [cd,       setCd]       = useState(0);
  const [progress, setProgress] = useState({i:0,total:0,player:""});
  const abort = useRef(null);
  const intR  = useRef(null);
  const cdR   = useRef(null);
  const nid   = useRef(0);

  useEffect(() => { ping().then(setProxyOk); }, []);

  const addLog = useCallback((msg,type="info") => {
    setLog(p => [...p.slice(-150),{msg,type}]);
  },[]);

  const pushNotif = useCallback((deal) => {
    const id = ++nid.current;
    setNotifs(p => [{id,deal},...p.slice(0,7)]);
    setTimeout(()=>setNotifs(p=>p.filter(n=>n.id!==id)),18000);
  },[]);

  const runScan = useCallback(async () => {
    if (scanning) return;
    const ok = await ping(); setProxyOk(ok);
    if (!ok) { addLog("Proxy offline","error"); return; }
    setScanning(true); setLog([]); setDeals([]); setAuctions([]); setBestOffers([]);
    abort.current = new AbortController();
    const all = [];
    const allAuctions = [];
    const allOffers = [];

    const runTargets = async (targets, tierLabel) => {
      addLog(`\n${tierLabel} — scanning ${targets.length} targets…`,"info");
      for (let i=0; i<targets.length; i++) {
        if (abort.current.signal.aborted) return;
        const t = targets[i];
        setProgress({i:i+1, total:targets.length, player:t.player});
        addLog(`[${i+1}/${targets.length}] ${t.player} — ${t.binQ.slice(0,38)}…`,"info");
        try {
          // Run BIN, auction, and best offer scans in parallel
          const [data, auctionData, offerData] = await Promise.all([
            scanTarget(t),
            scanAuction(t),
            scanOffer(t),
          ]);

          const {listings, marketPrice, compCount, compSample, compWithImages} = data;
          if (!marketPrice) { addLog(`  ↳ No market data (${compCount} comps)`,"info"); }
          else addLog(`  ↳ Market: ${f$(marketPrice)} from ${compCount} listings`,"info");
          if (!listings.length) addLog(`  ↳ No BIN listings found`,"info");

          // Process BIN listings
          for (const lst of listings) {
            if (!lst.price || lst.price > t.maxBuy) continue;
            if (!marketPrice) continue;
            if (marketPrice > lst.price * 20) continue;
            const buyShipping = lst.freeShipping ? 0 : (lst.shippingCost || 5);
            const {net, profit, roi:r, totalFees, sellShipping, totalCost} = calcROI(marketPrice, lst.price, buyShipping);
            const deal = {
              id: lst.itemId+"-"+i+tierLabel, sport:t.sport, player:t.player,
              listing:lst, marketPrice, net, profit, roi:r,
              totalFees, sellShipping, buyShipping, totalCost,
              compSample: compSample||[], compCount, compWithImages: compWithImages||[],
              prospectRank:t.prospectRank||0, hypeReason:t.hypeReason||"",
              isAuction: false,
            };
            all.push(deal);
            setDeals([...all].sort((a,b)=>b.roi-a.roi));
            if (r>=ROI_MIN) { addLog(`  🔥 BIN BUY: ${lst.title.slice(0,36)} | ${f$(lst.price)}+${f$(buyShipping)} → ${fR(r)}`,"alert"); pushNotif(deal); }
            else addLog(`  • BIN ${f$(lst.price)}+${f$(buyShipping)} / mkt ${f$(marketPrice)} → ${fR(r)}`,"info");
          }

          // Process auctions — 20% ROI threshold
          const {auctions: auctionListings, marketPrice: aMarket} = auctionData;
          const mkt = aMarket || marketPrice;
          if (auctionListings?.length) {
            addLog(`  ↳ ${auctionListings.length} auctions ending <24hrs`,"info");
            for (const alst of auctionListings) {
              if (!alst.currentBid || !mkt) continue;
              const aBuyShip = alst.freeShipping ? 0 : (alst.shippingCost || 5);
              const aCalc = calcROI(mkt, alst.currentBid, aBuyShip);
              if (aCalc.roi >= 0.20) {
                const aDeal = {
                  id: alst.itemId+"-auction-"+i, sport:t.sport, player:t.player,
                  listing:alst, marketPrice:mkt, net:aCalc.net, profit:aCalc.profit, roi:aCalc.roi,
                  totalFees:aCalc.totalFees, sellShipping:aCalc.sellShipping, buyShipping:aBuyShip, totalCost:aCalc.totalCost,
                  compSample: compSample||[], compCount, compWithImages: compWithImages||[],
                  prospectRank:t.prospectRank||0, hypeReason:t.hypeReason||"",
                  isAuction: true,
                  hoursLeft: alst.hoursLeft,
                  endTime: alst.endTime,
                };
                allAuctions.push(aDeal);
                setAuctions([...allAuctions].sort((a,b)=>a.hoursLeft-b.hoursLeft));
                addLog(`  🔨 AUCTION: ${alst.title.slice(0,34)} | ${f$(alst.currentBid)} bid → ${fR(aCalc.roi)} ROI | ${alst.hoursLeft}h left`,"alert");
                pushNotif({...aDeal, isAuctionAlert:true});
              }
            }
          }

          // Process Best Offer listings
          const {offers} = offerData;
          if (offers?.length) {
            addLog(`  ↳ ${offers.length} Best Offer listings found`,"info");
            for (const lst of offers) {
              if (!lst.marketPrice || !lst.targetOffer) continue;
              allOffers.push({
                id: lst.itemId+"-offer-"+i, sport:t.sport, player:t.player,
                listing:lst, marketPrice:lst.marketPrice,
                lowestOffer:lst.lowestOffer, targetOffer:lst.targetOffer, maxOffer:lst.maxOffer,
                roiAtLowest:lst.roiAtLowest, roiAtTarget:lst.roiAtTarget, roiAtMax:lst.roiAtMax,
                netSale:lst.netSale, sellShip:lst.sellShip,
                compSample: offerData.compSample||[], compWithImages: offerData.compWithImages||[],
                prospectRank:t.prospectRank||0, hypeReason:t.hypeReason||"",
              });
              setBestOffers([...allOffers].sort((a,b)=>b.roiAtTarget-a.roiAtTarget));
              addLog(`  💬 OFFER: ${lst.title.slice(0,30)} | Ask ${f$(lst.price)} → Target ${f$(lst.targetOffer)} (${fR(lst.roiAtTarget)} ROI)`,"alert");
            }
          }
        await slp(1500);
      }
    };

    // Always scan Tier 1
    await runTargets(TIER1, "🔥 TIER 1 (most liquid)");

    // Only scan Tier 2 if no 10%+ ROI deals found yet
    if (!abort.current.signal.aborted) {
      const hotSoFar = all.filter(d=>d.roi>=ROI_MIN).length;
      if (hotSoFar === 0) {
        addLog(`\n↳ No 10%+ ROI in Tier 1 — expanding to Tier 2…`,"info");
        await runTargets(TIER2, "🔍 TIER 2 (expanded)");
      } else {
        addLog(`\n✅ Found ${hotSoFar} deal(s) in Tier 1 — skipping Tier 2`,"success");
      }
    }

    const hot = all.filter(d=>d.roi>=ROI_MIN);
    addLog(`\nDone — ${all.length} BIN | ${hot.length} BIN signals | ${allAuctions.length} auctions | ${allOffers.length} best offers`,hot.length||allAuctions.length||allOffers.length?"alert":"success");
    setLastScan(new Date()); setScanning(false);
    setProgress({i:0,total:0,player:""});
  },[scanning,addLog,pushNotif]);

                        {[
                          {l:"CARD PRICE",      v:f$(card.listing.price),                                                    c:"#fff"},
                          {l:"BUY SHIPPING",    v:card.listing.freeShipping?"FREE":f$(card.buyShipping||5),                 c:"#aac"},
                          {l:"TOTAL COST IN",   v:f$(totalIn),                                                               c:"#fff"},
                          {l:"SELL @ MARKET",   v:f$(card.marketPrice),                                                      c:"#00cfff"},
                          {l:"EBAY FEES",        v:"−"+f$(card.totalFees||(card.marketPrice*0.1325+0.30)),                  c:"#ff9d6a"},
                          {l:"SELL SHIPPING",   v:"−"+f$(card.sellShipping||10),                                             c:"#ff9d6a"},
                          {l:"NET PROCEEDS",    v:f$(card.net),                                                              c:"#c084fc"},
                          {l:"PROFIT / ROI",    v:f$(profit)+" / "+fR(card.roi),                                             c:ac},
                        ].map(f=>(
                          <div key={f.l}>
                            <div style={{fontSize:8,color:"#4a7a9b",letterSpacing:1,marginBottom:1}}>{f.l}</div>
                            <div style={{fontSize:13,fontWeight:"bold",color:f.c}}>{f.v}</div>
                          </div>
                        ))}
                      </div>
                      <div style={{display:"flex",gap:3,flexWrap:"wrap",alignItems:"center",marginBottom:8}}>
                        <span style={{fontSize:8,color:"#4a7a9b"}}>MARKET SAMPLE ({card.compCount} listings):</span>
                        {card.compSample.slice(0,6).map((c,i)=><span key={i} style={{fontSize:9,color:"#5a9ab0",background:"rgba(0,150,200,.1)",padding:"1px 5px",borderRadius:2}}>{f$(c)}</span>)}
                      </div>
                      {/* Comp images for visual verification */}
                      {card.compWithImages?.length>0&&(
                        <div style={{marginBottom:10}}>
                          <div style={{fontSize:8,color:"#4a7a9b",marginBottom:4}}>VERIFY COMPS — tap to check these are the same card:</div>
                          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                            {card.compWithImages.map((c,i)=>(
                              <a key={i} href={c.url} target="_blank" rel="noreferrer" style={{textDecoration:"none"}}>
                                <div style={{background:"rgba(255,255,255,.05)",border:"1px solid #1a2a3a",borderRadius:4,padding:4,width:80}}>
                                  {c.image&&<img src={c.image} alt={c.title} style={{width:72,height:72,objectFit:"contain",display:"block"}} onError={e=>e.target.style.display="none"}/>}
                                  <div style={{fontSize:8,color:"#5a9ab0",marginTop:2}}>{f$(c.price)}</div>
                                </div>
                              </a>
                            ))}
                          </div>
                        </div>
                      )}
                      <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                        <a href={card.listing.url} target="_blank" rel="noreferrer" style={{display:"inline-block",background:hot?(ib?"linear-gradient(135deg,#7c3aed,#5b21b6)":"linear-gradient(135deg,#00b87d,#008a5a)"):"rgba(0,150,200,.15)",color:"#fff",textDecoration:"none",padding:"7px 14px",borderRadius:4,fontSize:10,fontWeight:"bold",fontFamily:"inherit",letterSpacing:1,border:hot?"none":"1px solid #1a4a6a",boxShadow:hot?`0 0 12px ${ib?"rgba(168,85,247,.5)":"rgba(0,200,125,.4)"}`:"none"}}>→ VIEW LISTING ↗</a>
                        {card.listing.seller&&<span style={{fontSize:9,color:"#4a7a9b"}}>Seller: {card.listing.seller}</span>}
                        <span style={{fontSize:8,color:"#2a4a5a",marginLeft:"auto"}}>15% fee · $500 max</span>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Sidebar */}
          <div style={{position:"sticky",top:16,display:"flex",flexDirection:"column",gap:9}}>
            <div style={{background:"rgba(0,0,0,.45)",border:"1px solid #0a2a1a",borderRadius:6,overflow:"hidden"}}>
              <div style={{padding:"8px 12px",background:"rgba(0,255,157,.04)",borderBottom:"1px solid #0a2a1a",display:"flex",justifyContent:"space-between"}}>
                <span style={{fontSize:9,color:"#00ff9d",letterSpacing:2}}>SCAN LOG</span>
                {scanning&&<span style={{fontSize:8,color:"#00cfff",animation:"pulse 1s infinite"}}>● LIVE</span>}
              </div>
              <div style={{height:300,overflowY:"auto",padding:"8px 11px",display:"flex",flexDirection:"column",gap:2}}>
                {log.length===0?<div style={{fontSize:10,color:"#1a3a4a",marginTop:16,textAlign:"center"}}>Awaiting scan…</div>
                  :[...log].reverse().map((l,i)=><div key={i} style={{fontSize:9,lineHeight:1.5,color:l.type==="alert"?"#00ff9d":l.type==="success"?"#4adf9d":l.type==="error"?"#ff6a7a":"#4a7a8a"}}>{l.msg}</div>)}
              </div>
            </div>

            <div style={{background:"rgba(0,0,0,.3)",border:"1px solid #1a2a3a",borderRadius:6,padding:11}}>
              <div style={{fontSize:8,color:"#00cfff",letterSpacing:2,marginBottom:7}}>HOW IT WORKS</div>
              {[
                ["Data","eBay Browse API (live)"],
                ["Listings","Active BIN only"],
                ["Market Price","Median of live listings"],
                ["Max buy","$500"],
                ["Fees","15% of market price"],
                ["ROI","(Net − Buy) / Buy"],
                ["Signal","≥10% ROI"],
                ["Targets",`${TIER1.length} Tier1 + ${TIER2.length} Tier2`],
              ].map(([k,v])=>(
                <div key={k} style={{display:"flex",justifyContent:"space-between",gap:6,fontSize:9,marginBottom:4,borderBottom:"1px solid #0a1a24",paddingBottom:3}}>
                  <span style={{color:"#4a7a9b"}}>{k}</span><span style={{color:"#8aacbc",textAlign:"right"}}>{v}</span>
                </div>
              ))}
            </div>

            <div style={{background:"rgba(20,0,40,.5)",border:"1px solid #4a1a7a",borderRadius:6,padding:11}}>
              <div style={{fontSize:8,color:"#a855f7",letterSpacing:2,marginBottom:7}}>🔮 BOWMAN PROSPECTS</div>
              {[...TIER1,...TIER2].filter(t=>t.sport==="bowman").map(t=>(
                <div key={t.player} style={{marginBottom:7}}>
                  <div style={{fontSize:9,color:"#c4b5fd",fontWeight:"bold"}}>{t.player} #{t.prospectRank}</div>
                  <div style={{fontSize:8,color:"#7a6a8a",lineHeight:1.4}}>{t.hypeReason}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
