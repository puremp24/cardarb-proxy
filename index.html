const ROI_MIN = 0.10;
const AUC_MIN = 0.20;
const FVF     = 0.1325;
const ORDER   = 0.30;

function calcROI(salePrice, buyCost, buyShip) {
  const sellShip = salePrice > 50 ? 10 : 5;
  const fees     = salePrice * FVF + ORDER;
  const net      = salePrice - fees - sellShip;
  const cost     = buyCost + (buyShip || 0);
  return { net, fees, sellShip, cost, profit: net - cost, roi: (net - cost) / cost };
}

function calcOffers(ask, market, ship) {
  const sellShip = market > 50 ? 10 : 5;
  const netSale  = market - (market * FVF) - ORDER - sellShip;
  const bs       = ship || 5;
  const low      = Math.max(Math.floor(Math.min(ask * 0.60, (netSale / 1.30) - bs)), 1);
  const target   = Math.max(Math.floor((netSale / 1.20) - bs), 1);
  const max      = Math.max(Math.floor((netSale / 1.10) - bs), 1);
  const roiAt    = o => { const c = o + bs; return (netSale - c) / c; };
  return { low, target, max, roiLow: roiAt(low), roiTarget: roiAt(target), roiMax: roiAt(max), netSale, sellShip };
}

  scanning: false, log: [], tab: "all", roiMin: 0,
  lastScan: null, proxyOk: null, auto: false, cd: 0,
  prog: { i: 0, n: 0, p: "" },
};
let abortScan = false;
let autoTimer = null, cdTimer = null;
let nid = 0;

function setState(patch) {
  Object.assign(state, typeof patch === "function" ? patch(state) : patch);
  render();
}

// ── API ───────────────────────────────────────────────────────────────────────
async function ping() {
  try {
    const r = await fetch(PROXY + "/ping", { signal: AbortSignal.timeout(6000) });
    return r.ok;
  } catch { return false; }
}

async function apiFetch(path) {
  const r = await fetch(PROXY + path);
  if (!r.ok) throw new Error("HTTP " + r.status);
  return r.json();
}

// ── Scan ──────────────────────────────────────────────────────────────────────
function addLog(msg, type) {
  state.log = [...state.log.slice(-150), { msg, type: type || "info" }];
}

function pushNotif(deal) {
  const id = ++nid;
  const wrap = document.getElementById("toasts");
  if (!wrap) return;
  const el = document.createElement("div");
  const isAuc = deal.isAuction;
  const ac = isAuc ? "#f59e0b" : deal.sport === "bowman" ? "#a855f7" : "#00ff9d";
  el.className = "toast " + (isAuc ? "toast-auc" : "toast-buy");
  el.style.border = "1px solid " + ac;
  el.style.borderLeftColor = ac;
  el.innerHTML =
    '<div class="toast-title" style="color:' + ac + '">' + (isAuc ? "🔨 AUCTION" : "🚨 BUY SIGNAL") + " — " + (deal.sport || "").toUpperCase() + "</div>" +
    '<div class="toast-player">' + deal.player + "</div>" +
    '<div class="toast-desc">' + (deal.listing.title || "").slice(0, 50) + "</div>" +
    '<a href="' + deal.listing.url + '" target="_blank" class="toast-link">' + (isAuc ? "BID NOW" : "VIEW LISTING") + " ↗</a>";
  wrap.prepend(el);
  setTimeout(() => el.remove(), 18000);
}

async function processTarget(t, i, total, tier) {
  if (abortScan) return;
  const qs = "binQ=" + encodeURIComponent(t.binQ) + "&soldQ=" + encodeURIComponent(t.soldQ || t.binQ) + "&maxPrice=" + t.maxBuy;
  addLog("[" + (i + 1) + "/" + total + "] " + t.player + " " + tier);
  render();

  state.prog = { i: i + 1, n: total, p: t.player };

  const [binRes, aucRes, offRes] = await Promise.allSettled([
    apiFetch("/scan?" + qs),
    apiFetch("/scan-auction?" + qs),
    apiFetch("/scan-offer?" + qs),
  ]);

  let market = null;

  if (binRes.status === "fulfilled") {
    const d = binRes.value;
    market = d.marketPrice;
    if (market) addLog("  Market: " + f$(market) + " (" + (d.compCount || 0) + " comps)");
    else addLog("  No market data");

    for (const lst of (d.listings || [])) {
      if (!lst.price || lst.price > t.maxBuy || !market) continue;
      const ship = lst.freeShipping ? 0 : (lst.shippingCost || 5);
      const c = calcROI(market, lst.price, ship);
      const deal = {
        id: lst.itemId + "-" + i, type: "bin", sport: t.sport, player: t.player,
        listing: lst, market, ship, comps: d.compSample || [], compImgs: d.compWithImages || [],
        rank: t.rank || 0, why: t.why || "", ...c,
      };
      state.deals.push(deal);
      state.deals.sort((a, b) => b.roi - a.roi);
      if (c.roi >= ROI_MIN) { addLog("  BUY: " + f$(lst.price) + " -> " + fR(c.roi), "alert"); pushNotif(deal); }
    }
  }

  if (aucRes.status === "fulfilled") {
    const d = aucRes.value;
    const mkt = d.marketPrice || market;
    for (const a of (d.auctions || [])) {
      if (!a.currentBid || !mkt) continue;
      const ship = a.freeShipping ? 0 : (a.shippingCost || 5);
      const c = calcROI(mkt, a.currentBid, ship);
      if (c.roi >= AUC_MIN) {
        const deal = {
          id: a.itemId + "-auc", type: "auction", isAuction: true, sport: t.sport, player: t.player,
          listing: a, market: mkt, ship, hoursLeft: a.hoursLeft, rank: t.rank || 0, why: t.why || "", ...c,
        };
        state.auctions.push(deal);
        state.auctions.sort((a, b) => a.hoursLeft - b.hoursLeft);
        addLog("  AUCTION: " + f$(a.currentBid) + " bid " + fR(c.roi) + " " + a.hoursLeft + "h left", "alert");
        pushNotif(deal);
      }
    }
  }

  if (offRes.status === "fulfilled") {
    const d = offRes.value;
    const mkt = d.marketPrice || market;
    for (const o of (d.offers || [])) {
      if (!mkt) continue;
      const ship = o.freeShipping ? 0 : (o.shippingCost || 5);
      const oc = calcOffers(o.price, mkt, ship);
      if (oc.roiTarget >= ROI_MIN) {
        state.offers.push({
          id: o.itemId + "-off", type: "offer", sport: t.sport, player: t.player,
          listing: o, market: mkt, ship, rank: t.rank || 0, why: t.why || "", ...oc,
        });
        state.offers.sort((a, b) => b.roiTarget - a.roiTarget);
        addLog("  OFFER: ask " + f$(o.price) + " target " + f$(oc.target) + " " + fR(oc.roiTarget), "alert");
      }
    }
  }

  render();
  await slp(1500);
}

async function runScan() {
  if (state.scanning) return;
  const ok = await ping();
  setState({ proxyOk: ok });
  if (!ok) { addLog("Proxy offline", "error"); render(); return; }

  abortScan = false;
  setState({ scanning: true, log: [], deals: [], auctions: [], offers: [] });

  addLog("TIER 1 — " + TIER1.length + " targets");
  for (let i = 0; i < TIER1.length; i++) {
    if (abortScan) break;
    await processTarget(TIER1[i], i, TIER1.length, "(T1)");
  }

  if (!abortScan && state.deals.filter(d => d.roi >= ROI_MIN).length === 0) {
    addLog("No ROI in Tier 1 — expanding to Tier 2...");
    for (let i = 0; i < TIER2.length; i++) {
      if (abortScan) break;
      await processTarget(TIER2[i], i, TIER2.length, "(T2)");
    }
  }

  const hot = state.deals.filter(d => d.roi >= ROI_MIN);
  addLog("Done — " + state.deals.length + " BIN | " + hot.length + " signals | " + state.auctions.length + " auctions | " + state.offers.length + " offers", hot.length || state.auctions.length ? "alert" : "info");
  setState({ scanning: false, lastScan: new Date(), prog: { i: 0, n: 0, p: "" } });
}

function stopScan() {
  abortScan = true;
  addLog("Stopped.");
  setState({ scanning: false, prog: { i: 0, n: 0, p: "" } });
}

function toggleAuto() {
  const auto = !state.auto;
  setState({ auto });
  if (auto) {
    runScan();
    state.cd = 300;
    autoTimer = setInterval(() => { runScan(); state.cd = 300; }, 300000);
    cdTimer   = setInterval(() => { state.cd = Math.max(0, state.cd - 1); render(); }, 1000);
  } else {
    clearInterval(autoTimer); clearInterval(cdTimer);
    setState({ cd: 0 });
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    if (k === "className") e.className = v;
    else if (k === "style" && typeof v === "object") Object.assign(e.style, v);
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  }
  for (const child of children.flat()) {
    if (child == null) continue;
    e.appendChild(typeof child === "string" ? document.createTextNode(child) : child);
  }
  return e;
}

function badge(text, cls) { return el("span", { className: "badge " + cls }, text); }

function fieldRow(label, value, color) {
  const d = el("div", {});
  d.appendChild(el("div", { className: "field-label" }, label));
  d.appendChild(el("div", { className: "field-val", style: { color: color || "#fff" } }, value));
  return d;
}

function renderBINCard(card) {
  const hot = card.roi >= ROI_MIN;
  const ib  = card.sport === "bowman";
  const ac  = ib ? "#a855f7" : hot ? "#00ff9d" : card.roi < 0 ? "#ff4a6a" : "#f5c842";
  const cls = ib ? "card card-bin-bow" : hot ? "card card-bin-hot" : "card card-bin";

  const header = el("div", { style: { display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:"10px", flexWrap:"wrap", gap:"4px" } },
    el("div", { style: { display:"flex", gap:"6px", alignItems:"center", flexWrap:"wrap" } },
      el("span", { className:"badge", style:{ color: SC[card.sport]||"#888", background:(SC[card.sport]||"#555")+"22", border:"1px solid "+(SC[card.sport]||"#555")+"44", padding:"2px 6px", borderRadius:"2px", fontSize:"8px", letterSpacing:"1px" } }, (SI[card.sport]||"")+" "+(card.sport||"").toUpperCase()),
      el("span", { className:"card-title" }, card.player),
      card.rank ? badge("#" + card.rank, "badge") : null,
      badge("LIVE", "badge badge-live"),
      card.listing.imageMatch === true ? badge("✅ VERIFIED", "badge badge-ok") : null,
      card.listing.imageMatch === null ? badge("⚠ UNVERIFIED", "badge badge-warn") : null,
    ),
    hot ? badge(ib ? "🔮 BUY" : "🔥 BUY", ib ? "badge badge-bow" : "badge badge-buy") : null,
  );

  const img = card.listing.image ? el("img", { src: card.listing.image, className:"card-img", onerror:"this.style.display='none'" }) : null;

  const fields = el("div", { className:"fields" },
    fieldRow("CARD PRICE",   f$(card.listing.price), "#fff"),
    fieldRow("BUY SHIPPING", card.listing.freeShipping ? "FREE" : f$(card.ship), "#aac"),
    fieldRow("TOTAL COST",   f$(card.cost), "#ddd"),
    fieldRow("SELL MARKET",  f$(card.market), "#00cfff"),
    fieldRow("EBAY FEES",    "-" + f$(card.fees), "#ff9d6a"),
    fieldRow("SELL SHIP",    "-" + f$(card.sellShip), "#ff9d6a"),
    fieldRow("NET",          f$(card.net), "#c084fc"),
    fieldRow("PROFIT/ROI",   f$(card.profit) + " / " + fR(card.roi), ac),
  );

  const comps = card.comps && card.comps.length ? el("div", { className:"comps" },
    el("span", { style:{ fontSize:"8px", color:"#4a7a9b" } }, "COMPS:"),
    ...card.comps.slice(0, 6).map(c => el("span", { className:"comp-price" }, f$(c))),
  ) : null;

  const viewBtn = el("a", { href: card.listing.url, target:"_blank", className:"btn-view " + (hot ? (ib ? "btn-view-bow" : "btn-view-hot") : "btn-view-plain") }, "→ VIEW LISTING ↗");

  const div = el("div", { className: cls });
  div.appendChild(header);
  if (ib && card.why) div.appendChild(el("div", { style:{ fontSize:"9px", color:"#c4b5fd", marginBottom:"5px", fontStyle:"italic" } }, card.why));
  if (img) div.appendChild(img);
  div.appendChild(el("div", { className:"card-desc" }, card.listing.title || ""));
  div.appendChild(fields);
  if (comps) div.appendChild(comps);
  div.appendChild(viewBtn);
  return div;
}

function renderAucCard(card) {
  const hrs = card.hoursLeft || 0;
  const urg = hrs < 2 ? "#ff4a6a" : hrs < 6 ? "#f59e0b" : "#00ff9d";

  const div = el("div", { className:"card card-auction" });
  div.appendChild(el("div", { style:{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"8px" } },
    el("div", { style:{ display:"flex", gap:"6px" } },
      badge("🔨 AUCTION", "badge badge-auc"),
      el("span", { className:"badge", style:{ color: urg, border:"1px solid "+urg+"44", padding:"2px 6px", borderRadius:"2px", fontSize:"8px" } }, "⏱ " + hrs + "h LEFT"),
    ),
    el("span", { style:{ fontSize:"10px", fontWeight:"bold", color:"#f59e0b" } }, fR(card.roi) + " ROI"),
  ));
  div.appendChild(el("div", { style:{ fontSize:"9px", color:"#7a6a4a", marginBottom:"4px" } }, (SI[card.sport]||"") + " " + card.player));
  div.appendChild(el("div", { className:"card-desc", style:{ color:"#b0a070" } }, card.listing.title || ""));
  div.appendChild(el("div", { className:"fields" },
    fieldRow("CURRENT BID", f$(card.listing.currentBid), "#fff"),
    fieldRow("MARKET",      f$(card.market), "#00cfff"),
    fieldRow("NET",         f$(card.net), "#c084fc"),
    fieldRow("PROFIT",      f$(card.profit), "#f59e0b"),
  ));
  div.appendChild(el("a", { href: card.listing.url, target:"_blank", className:"btn-view btn-view-auc" }, "🔨 BID NOW — " + hrs + "h LEFT ↗"));
  return div;
}

function renderOfferCard(card) {
  const div = el("div", { className:"card card-offer" });
  div.appendChild(el("div", { style:{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"8px" } },
    badge("💬 BEST OFFER", "badge badge-off"),
    el("span", { style:{ fontSize:"10px", fontWeight:"bold", color:"#818cf8" } }, fR(card.roiTarget) + " IF ACCEPTED"),
  ));
  div.appendChild(el("div", { style:{ fontSize:"9px", color:"#7a7aaa", marginBottom:"4px" } }, (SI[card.sport]||"") + " " + card.player));
  div.appendChild(el("div", { className:"card-desc", style:{ color:"#9090c0" } }, card.listing.title || ""));
  div.appendChild(el("div", { className:"fields" },
    fieldRow("ASKING",    f$(card.listing.price), "#888"),
    fieldRow("MARKET",    f$(card.market), "#00cfff"),
    fieldRow("NET IF SOLD", f$(card.netSale), "#c084fc"),
  ));

  const ladder = el("div", { className:"offer-ladder" });
  ladder.appendChild(el("div", { style:{ fontSize:"8px", color:"#818cf8", letterSpacing:"2px" } }, "OFFER LADDER"));
  const grid = el("div", { className:"offer-grid" });
  [
    { label:"AGGRESSIVE", sub:"start here",    offer: card.low,    roi: card.roiLow,    color:"#34d399" },
    { label:"TARGET",     sub:"20% ROI",        offer: card.target, roi: card.roiTarget, color:"#818cf8" },
    { label:"MAX OFFER",  sub:"walk away above",offer: card.max,    roi: card.roiMax,    color:"#f59e0b" },
  ].forEach(o => {
    const col = el("div", { className:"offer-col", style:{ border:"1px solid "+o.color+"33" } });
    col.appendChild(el("div", { className:"offer-label", style:{ color:o.color } }, o.label));
    col.appendChild(el("div", { className:"offer-sub" }, o.sub));
    col.appendChild(el("div", { className:"offer-price", style:{ color:o.color } }, f$(o.offer)));
    col.appendChild(el("div", { className:"offer-roi" }, fR(o.roi)));
    grid.appendChild(col);
  });
  ladder.appendChild(grid);
  div.appendChild(ladder);
  div.appendChild(el("a", { href: card.listing.url, target:"_blank", className:"btn-view btn-view-off" }, "💬 MAKE OFFER ↗"));
  div.appendChild(el("span", { style:{ fontSize:"9px", color:"#4a4a7a", marginLeft:"10px" } }, "Start " + f$(card.low) + ", max " + f$(card.max)));
  return div;
}

function render() {
  const s = state;
  const filtered = s.deals.filter(d => (s.tab === "all" || d.sport === s.tab) && d.roi >= s.roiMin / 100);
  const hotCount = s.deals.filter(d => d.roi >= ROI_MIN).length;
  const pct = s.prog.n ? Math.round(s.prog.i / s.prog.n * 100) : 0;
  const hasResults = s.deals.length || s.auctions.length || s.offers.length;

  const root = document.getElementById("root");
  root.innerHTML = "";

  // Header
  const hdr = el("div", { className:"header" });
  const hdrRow = el("div", { className:"header-row" });

  const logoDiv = el("div", {});
  logoDiv.appendChild(el("div", { className:"tagline" }, "LIVE EBAY · BIN + AUCTIONS + BEST OFFER · 13.25% FEE MODEL"));
  const logo = el("div", { className:"logo" });
  logo.appendChild(document.createTextNode("CARD"));
  logo.appendChild(el("span", {}, "ARB"));
  logoDiv.appendChild(logo);
  logoDiv.appendChild(el("div", { className:"subtitle" }, TIER1.length + " Tier 1 + " + TIER2.length + " Tier 2 · expands if no ROI found"));
  hdrRow.appendChild(logoDiv);

  const btnRow = el("div", { className:"btn-row" });
  const statusCls = s.proxyOk === true ? "status status-live" : s.proxyOk === false ? "status status-off" : "status status-check";
  const statusTxt = s.proxyOk === true ? "● LIVE" : s.proxyOk === false ? "● OFFLINE" : "● CHECKING";
  btnRow.appendChild(el("div", { className: statusCls }, statusTxt));
  if (s.lastScan) {
    const ts = el("div", { style:{ fontSize:"9px", color:"#4a6a7a" } }, s.lastScan.toLocaleTimeString() + (s.auto ? "  " + s.cd + "s" : ""));
    btnRow.appendChild(ts);
  }
  if (s.scanning) btnRow.appendChild(el("button", { className:"btn btn-stop", onclick: stopScan }, "⏹ STOP"));
  const autoBtn = el("button", { className: "btn" + (s.auto ? " btn-auto-on" : ""), onclick: toggleAuto }, s.auto ? "⏸ AUTO" : "▶ AUTO");
  btnRow.appendChild(autoBtn);
  const scanBtn = el("button", { className:"btn btn-scan", onclick: runScan });
  if (s.scanning || s.proxyOk === false) scanBtn.setAttribute("disabled", "true");
  scanBtn.textContent = s.scanning ? "⟳ SCANNING" : "⚡ SCAN NOW";
  btnRow.appendChild(scanBtn);
  hdrRow.appendChild(btnRow);
  hdr.appendChild(hdrRow);

  if (s.scanning && s.prog.n > 0) {
    const pb = el("div", { className:"progress-bar" });
    pb.appendChild(el("div", { className:"progress-info" },
      el("span", {}, s.prog.p + " (" + s.prog.i + "/" + s.prog.n + ")"),
      el("span", {}, pct + "%"),
    ));
    const track = el("div", { className:"progress-track" });
    track.appendChild(el("div", { className:"progress-fill", style:{ width: pct + "%" } }));
    pb.appendChild(track);
    hdr.appendChild(pb);
  }
  root.appendChild(hdr);

  // Stats
  if (hasResults) {
    const bestROI = s.deals.length ? Math.max(...s.deals.map(d => d.roi)) : null;
    const stats = el("div", { className:"stats" });
    [
      { l:"BIN",     v: s.deals.length,    c:"#00cfff" },
      { l:"SIGNALS", v: hotCount,           c: hotCount > 0 ? "#00ff9d" : "#4a7a9b" },
      { l:"AUCTIONS",v: s.auctions.length,  c: s.auctions.length > 0 ? "#f59e0b" : "#4a7a9b" },
      { l:"OFFERS",  v: s.offers.length,    c: s.offers.length > 0 ? "#818cf8" : "#4a7a9b" },
      { l:"BEST ROI",v: bestROI !== null ? fR(bestROI) : "-", c:"#f5c842" },
    ].forEach(st => {
      const box = el("div", { className:"stat" });
      box.appendChild(el("div", { className:"stat-label" }, st.l));
      box.appendChild(el("div", { className:"stat-val", style:{ color: st.c } }, String(st.v)));
      stats.appendChild(box);
    });
    root.appendChild(stats);
  }

  // Main grid
  const grid = el("div", { className:"main-grid" });
  const main = el("div", {});

  // Auctions section
  if (s.auctions.length) {
    main.appendChild(el("div", { className:"section-title", style:{ color:"#f59e0b" } }, "🔨 AUCTIONS ENDING SOON — 20%+ ROI"));
    s.auctions.forEach(c => main.appendChild(renderAucCard(c)));
  }

  // Offers section
  if (s.offers.length) {
    main.appendChild(el("div", { className:"section-title", style:{ color:"#818cf8", marginTop: s.auctions.length ? "16px" : "0" } }, "💬 BEST OFFER OPPORTUNITIES"));
    s.offers.forEach(c => main.appendChild(renderOfferCard(c)));
  }

  // Filter tabs
  if (s.deals.length) {
    const filterRow = el("div", { className:"filter-row" });
    ["all","baseball","football","basketball","bowman"].forEach(sp => {
      const active = s.tab === sp;
      const btn = el("button", {
        className: "tab" + (active ? " tab-active" : ""),
        onclick: () => { state.tab = sp; render(); },
      }, sp === "all" ? "ALL" : sp === "bowman" ? "🔮 BOWMAN" : (SI[sp] || "") + " " + sp.toUpperCase());
      filterRow.appendChild(btn);
    });
    const roiWrap = el("div", { className:"roi-slider" });
    roiWrap.appendChild(el("span", { style:{ fontSize:"9px", color:"#4a7a9b" } }, "MIN ROI"));
    const slider = el("input", { type:"range", min:"-50", max:"50", value: String(s.roiMin) });
    slider.addEventListener("input", e => { state.roiMin = +e.target.value; render(); });
    roiWrap.appendChild(slider);
    roiWrap.appendChild(el("span", { style:{ fontSize:"9px", color:"#00ff9d", minWidth:"32px" } }, s.roiMin + "%"));
    filterRow.appendChild(roiWrap);
    main.appendChild(filterRow);
  }

  // Empty state
  if (!hasResults && !s.scanning) {
    const empty = el("div", { className:"empty" });
    empty.appendChild(el("div", { className:"empty-icon" }, "📡"));
    const txt = el("div", { className:"empty-text" });
    txt.innerHTML = "<strong style='color:#00ff9d'>SCAN NOW</strong><br><span style='font-size:10px'>" + TIER1.length + "+" + TIER2.length + " targets · BIN + Auctions + Best Offer · $500 max</span>";
    empty.appendChild(txt);
    main.appendChild(empty);
  }

  if (s.scanning && !s.deals.length) {
    const spinner = el("div", { style:{ textAlign:"center", padding:"28px 20px", border:"1px dashed #1a3a2a", borderRadius:"8px", marginBottom:"10px" } });
    spinner.appendChild(el("div", { className:"spinning", style:{ fontSize:"20px", marginBottom:"8px" } }, "⟳"));
    spinner.appendChild(el("div", { style:{ fontSize:"11px", color:"#4a7a9b" } }, "Scanning eBay..."));
    main.appendChild(spinner);
  }

  // BIN deals
  filtered.forEach(card => main.appendChild(renderBINCard(card)));
  grid.appendChild(main);

  // Sidebar
  const sidebar = el("div", { className:"sidebar" });

  // Log
  const logBox = el("div", { className:"sidebar-log" });
  const logHdr = el("div", { className:"log-header" });
  logHdr.appendChild(el("span", { className:"log-title" }, "SCAN LOG"));
  if (s.scanning) logHdr.appendChild(el("span", { className:"log-live" }, "● LIVE"));
  logBox.appendChild(logHdr);
  const logBody = el("div", { className:"log-body" });
  if (!s.log.length) {
    logBody.appendChild(el("div", { style:{ fontSize:"10px", color:"#1a3a4a", marginTop:"16px", textAlign:"center" } }, "Awaiting scan…"));
  } else {
    [...s.log].reverse().forEach(l => {
      logBody.appendChild(el("div", { className:"log-line log-" + l.type }, l.msg));
    });
  }
  logBox.appendChild(logBody);
  sidebar.appendChild(logBox);

  // How it works
  const howBox = el("div", { className:"sidebar-box" });
  howBox.appendChild(el("div", { style:{ fontSize:"8px", color:"#00cfff", letterSpacing:"2px", marginBottom:"7px" } }, "HOW IT WORKS"));
  [
    ["BIN ROI min", "10%"], ["Auction ROI min", "20%"], ["Offer target", "20% ROI"],
    ["eBay FVF", "13.25%"], ["Order fee", "$0.30"], ["Sell shipping", "$5-$10"],
    ["Max buy", "$500"], ["Tier 1", String(TIER1.length)], ["Tier 2", String(TIER2.length)],
  ].forEach(([k, v]) => {
    const row = el("div", { className:"sidebar-row" });
    row.appendChild(el("span", { className:"sidebar-key" }, k));
    row.appendChild(el("span", { className:"sidebar-val" }, v));
    howBox.appendChild(row);
  });
  sidebar.appendChild(howBox);

  // Bowman prospects
  const bowBox = el("div", { className:"bowman-box" });
  bowBox.appendChild(el("div", { style:{ fontSize:"8px", color:"#a855f7", letterSpacing:"2px", marginBottom:"7px" } }, "🔮 BOWMAN PROSPECTS"));
  [...TIER1, ...TIER2].filter(t => t.sport === "bowman").forEach(t => {
    const d = el("div", { style:{ marginBottom:"6px" } });
    d.appendChild(el("div", { className:"bowman-player" }, t.player + (t.rank ? " #" + t.rank : "")));
    if (t.why) d.appendChild(el("div", { className:"bowman-why" }, t.why));
    bowBox.appendChild(d);
  });
  sidebar.appendChild(bowBox);

  grid.appendChild(sidebar);
  root.appendChild(grid);
}

// ── Init ──────────────────────────────────────────────────────────────────────
render();
ping().then(ok => { state.proxyOk = ok; render(); });
</script>
