const ROI_MIN = 0.10;
const AUC_MIN = 0.20;
const FVF     = 0.1325;
const ORDER   = 0.30;

function calcROI(salePrice, buyCost, buyShip) {
  const sellShip = salePrice > 50 ? 10 : 5;
  const fees     = salePrice * FVF + ORDER;
  const net      = salePrice - fees - sellShip;
  const cost     = buyCost + (buyShip || 0);
  return { net, fees, sellShip, cost, profit: net - cost, roi: (net - cost) / cost };
}

function calcOffers(askPrice, market, ship) {
  const sellShip  = market > 50 ? 10 : 5;
  const netSale   = market - (market * FVF) - ORDER - sellShip;
  const buyShip   = ship || 5;
  const low       = Math.max(Math.floor(Math.min(askPrice * 0.60, (netSale / 1.30) - buyShip)), 1);
  const target    = Math.max(Math.floor((netSale / 1.20) - buyShip), 1);
  const max       = Math.max(Math.floor((netSale / 1.10) - buyShip), 1);
  const roiAt     = (o) => { const c = o + buyShip; return (netSale - c) / c; };
  return { low, target, max, roiLow: roiAt(low), roiTarget: roiAt(target), roiMax: roiAt(max), netSale, sellShip };
}

async function ping() {
  try { const r = await fetch(PROXY + "/ping", {signal:AbortSignal.timeout(6000)}); return r.ok; }
  catch { return false; }
}
async function apiFetch(path) {
  const r = await fetch(PROXY + path);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

function App() {
  const [deals,    setDeals]    = useState([]);
  const [auctions, setAuctions] = useState([]);
  const [offers,   setOffers]   = useState([]);
  const [scanning, setScanning] = useState(false);
  const [log,      setLog]      = useState([]);
  const [notifs,   setNotifs]   = useState([]);
  const [tab,      setTab]      = useState("all");
  const [roiMin,   setRoiMin]   = useState(0);
  const [lastScan, setLastScan] = useState(null);
  const [proxyOk,  setProxyOk]  = useState(null);
  const [auto,     setAuto]     = useState(false);
  const [cd,       setCd]       = useState(0);
  const [prog,     setProg]     = useState({i:0,n:0,p:""});
  const abort = useRef(null);
  const intR  = useRef(null);
  const cdR   = useRef(null);
  const nid   = useRef(0);

  useEffect(() => { ping().then(setProxyOk); }, []);

  const addLog = useCallback((msg, type) => {
    setLog(p => [...p.slice(-150), {msg, type: type||"info"}]);
  }, []);

  const pushNotif = useCallback((deal) => {
    const id = ++nid.current;
    setNotifs(p => [{id, deal}, ...p.slice(0, 7)]);
    setTimeout(() => setNotifs(p => p.filter(n => n.id !== id)), 18000);
  }, []);

  const runScan = useCallback(async () => {
    if (scanning) return;
    const ok = await ping();
    setProxyOk(ok);
    if (!ok) { addLog("Proxy offline", "error"); return; }
    setScanning(true);
    setLog([]); setDeals([]); setAuctions([]); setOffers([]);
    abort.current = new AbortController();
    const allBIN = [], allAuc = [], allOff = [];

    const processTarget = async (t, i, total, tier) => {
      if (abort.current.signal.aborted) return;
      setProg({i: i+1, n: total, p: t.player});
      addLog("[" + (i+1) + "/" + total + "] " + t.player + ` ${tier}`);

      const qs = `binQ=${encodeURIComponent(t.binQ}`) +
                 `&soldQ=${encodeURIComponent(t.soldQ||t.binQ}`) +
                 `&maxPrice=${t.maxBuy}`;

      const [binData, aucData, offData] = await Promise.allSettled([
        apiFetch(`/scan?${qs}`),
        apiFetch(`/scan-auction?${qs}`),
        apiFetch(`/scan-offer?${qs}`),
      ]);

      // BIN listings
      if (binData.status === "fulfilled") {
        const {listings, marketPrice, compCount, compSample, compWithImages} = binData.value;
        if (marketPrice) addLog(`  Market: ${f$(marketPrice}`) + " (" + compCount + " comps)");
        else addLog("  No market data");
        for (const lst of (listings||[])) {
          if (!lst.price || lst.price > t.maxBuy || !marketPrice) continue;
          const ship = lst.freeShipping ? 0 : (lst.shippingCost||5);
          const c    = calcROI(marketPrice, lst.price, ship);
          const deal = {
            id: lst.itemId+`-${i}`, type:"bin", sport:t.sport, player:t.player,
            listing:lst, market:marketPrice, ship, ...c,
            comps:compSample||[], compImgs:compWithImages||[],
            rank:t.rank||0, why:t.why||"",
          };
          allBIN.push(deal);
          setDeals([...allBIN].sort((a,b) => b.roi-a.roi));
          if (c.roi >= ROI_MIN) { addLog(`  BUY: ${f$(lst.price}`) + ` -> ${fR(c.roi}`), "alert"); pushNotif(deal); }
        }
      }

      // Auctions
      if (aucData.status === "fulfilled") {
        const {auctions: aList, marketPrice: aMarket} = aucData.value;
        const mkt = aMarket || (binData.status==="fulfilled" ? binData.value.marketPrice : null);
        for (const a of (aList||[])) {
          if (!a.currentBid || !mkt) continue;
          const ship = a.freeShipping ? 0 : (a.shippingCost||5);
          const c    = calcROI(mkt, a.currentBid, ship);
          if (c.roi >= AUC_MIN) {
            const deal = {
              id: a.itemId+"-auc", type:"auction", sport:t.sport, player:t.player,
              listing:a, market:mkt, ship, ...c, hoursLeft:a.hoursLeft,
              rank:t.rank||0, why:t.why||"",
            };
            allAuc.push(deal);
            setAuctions([...allAuc].sort((a,b) => a.hoursLeft-b.hoursLeft));
            addLog(`  AUCTION: ${f$(a.currentBid}`) + ` bid ${fR(c.roi}`) + " " + a.hoursLeft + "h left", "alert");
            pushNotif({...deal, isAuction:true});
          }
        }
      }

      // Best Offers
      if (offData.status === "fulfilled") {
        const {offers: oList, marketPrice: oMarket} = offData.value;
        const mkt = oMarket || (binData.status==="fulfilled" ? binData.value.marketPrice : null);
        for (const o of (oList||[])) {
          if (!mkt) continue;
          const ship = o.freeShipping ? 0 : (o.shippingCost||5);
          const oc   = calcOffers(o.price, mkt, ship);
          if (oc.roiTarget >= ROI_MIN) {
            allOff.push({
              id: o.itemId+"-off", type:"offer", sport:t.sport, player:t.player,
              listing:o, market:mkt, ship, ...oc,
              rank:t.rank||0, why:t.why||"",
            });
            setOffers([...allOff].sort((a,b) => b.roiTarget-a.roiTarget));
            addLog(`  OFFER: ${f$(o.price}`) + ` ask -> target ${f$(oc.target}`) + ` ${fR(oc.roiTarget}`), "alert");
          }
        }
      }
      await slp(1500);
    };

    // Tier 1
    addLog("TIER 1 — " + TIER1.length + " targets", "info");
    for (let i=0; i<TIER1.length; i++) {
      await processTarget(TIER1[i], i, TIER1.length, "(T1)");
    }

    // Tier 2 only if no BIN deals
    if (!abort.current.signal.aborted && allBIN.filter(d=>d.roi>=ROI_MIN).length===0) {
      addLog("No ROI in Tier 1 — expanding to Tier 2...", "info");
      for (let i=0; i<TIER2.length; i++) {
        await processTarget(TIER2[i], i, TIER2.length, "(T2)");
      }
    }

    const hot = allBIN.filter(d=>d.roi>=ROI_MIN);
    addLog("Done — " + allBIN.length + " BIN | " + hot.length + " signals | " + allAuc.length + " auctions | " + allOff.length + " offers", hot.length||allAuc.length||allOff.length?"alert":"success");
    setLastScan(new Date());
    setScanning(false);
    setProg({i:0,n:0,p:""});
  }, [scanning, addLog, pushNotif]);

  const stop = () => { abort.current?.abort(); setScanning(false); setProg({i:0,n:0,p:""}); addLog("Stopped."); };

  useEffect(() => {
    if (auto) {
      runScan(); setCd(300);
      intR.current = setInterval(() => { runScan(); setCd(300); }, 300000);
      cdR.current  = setInterval(() => setCd(c => Math.max(0,c-1)), 1000);
    } else {
      clearInterval(intR.current); clearInterval(cdR.current); setCd(0);
    }
    return () => { clearInterval(intR.current); clearInterval(cdR.current); };
  }, [auto]);

  const filtered = deals.filter(d => (tab==="all"||d.sport===tab) && d.roi>=roiMin/100);
  const hotCount = deals.filter(d=>d.roi>=ROI_MIN).length;
  const pct      = prog.n ? Math.round(prog.i/prog.n*100) : 0;

  return (
    <div style={{minHeight:"100vh",background:"#080c10",overflowX:"hidden"}}>
      <div style={{position:"fixed",inset:0,zIndex:0,pointerEvents:"none",backgroundImage:"linear-gradient(rgba(0,255,180,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,180,0.03) 1px,transparent 1px)",backgroundSize:"40px 40px"}}/>

      {/* Toast notifications */}
      <div style={{position:"fixed",top:16,right:16,zIndex:1000,display:"flex",flexDirection:"column",gap:8,maxWidth:290}}>
        {notifs.map(n => {
          const ib = n.deal.sport==="bowman";
          const isA = n.deal.isAuction;
          const ac = isA ? "#f59e0b" : ib ? "#a855f7" : "#00ff9d";
          return (
            <div key={n.id} style={{background:"linear-gradient(135deg,#001a0d,#002918)",border:`1px solid ${ac}`,borderLeft:`4px solid ${ac}`,borderRadius:6,padding:"11px 13px",animation:"slideIn .3s ease"}}>
              <div style={{fontSize:9,color:ac,fontWeight:"bold",marginBottom:3}}>
                {isA ? "🔨 AUCTION" : "🚨 BUY SIGNAL"} — {n.deal.sport?.toUpperCase()}
              </div>
              <div style={{fontSize:12,fontWeight:"bold",color:"#fff",marginBottom:2}}>{n.deal.player}</div>
              <div style={{fontSize:10,color:"#8ab",marginBottom:4}}>{n.deal.listing.title?.slice(0,50)}</div>
              <div style={{display:"flex",gap:8,marginBottom:4}}>
                <span style={{color:ac,fontWeight:"bold"}}>{isA ? fR(n.deal.roi) : fR(n.deal.roi)}</span>
                <span style={{color:"#ccc",fontSize:11}}>{isA ? "bid " : "buy "}{f$(n.deal.listing.price||n.deal.listing.currentBid)}</span>
              </div>
              <a href={n.deal.listing.url} target="_blank" rel="noreferrer" style={{fontSize:11,color:"#00cfff",textDecoration:"underline"}}>
                {isA ? "BID NOW" : "VIEW LISTING"} ↗
              </a>
            </div>
          );
        })}
      </div>

      <div style={{maxWidth:1200,margin:"0 auto",padding:"18px 14px",position:"relative",zIndex:1}}>

        {/* Header */}
        <div style={{marginBottom:20,borderBottom:"1px solid #1a2a3a",paddingBottom:16}}>
          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
            <div>
              <div style={{fontSize:9,letterSpacing:4,color:"#00ff9d",marginBottom:4}}>LIVE EBAY · BIN + AUCTIONS + BEST OFFER · 13.25% FEE MODEL</div>
              <h1 style={{fontSize:"clamp(26px,6vw,42px)",fontWeight:900,margin:0,color:"#fff",letterSpacing:-1}}>CARD<span style={{color:"#00ff9d"}}>ARB</span></h1>
              <div style={{fontSize:10,color:"#4a7a9b",marginTop:3}}>{TIER1.length} Tier 1 + {TIER2.length} Tier 2 · expands if no ROI found</div>
            </div>
            <div style={{display:"flex",gap:7,alignItems:"center",flexWrap:"wrap"}}>
              <div style={{fontSize:9,padding:"4px 8px",borderRadius:3,background:proxyOk===true?"rgba(0,255,157,.1)":"rgba(255,80,80,.1)",border:`1px solid ${proxyOk===true?"#00ff9d":"#ff5050"}`,color:proxyOk===true?"#00ff9d":"#ff7070"}}>
                {proxyOk===true?"● LIVE":proxyOk===false?"● OFFLINE":"● CHECKING"}
              </div>
              {lastScan && <div style={{fontSize:9,color:"#4a6a7a"}}>{lastScan.toLocaleTimeString()}{auto&&<span style={{color:"#00ff9d"}}> {cd}s</span>}</div>}
              {scanning && <button onClick={stop} style={{background:"rgba(255,80,80,.15)",border:"1px solid #ff5050",color:"#ff7070",padding:"7px 11px",borderRadius:4,cursor:"pointer",fontSize:10,fontFamily:"inherit"}}>⏹ STOP</button>}
              <button onClick={()=>setAuto(a=>!a)} style={{background:auto?"rgba(0,255,157,.15)":"transparent",border:`1px solid ${auto?"#00ff9d":"#2a4a5a"}`,color:auto?"#00ff9d":"#4a7a9b",padding:"7px 11px",borderRadius:4,cursor:"pointer",fontSize:10,fontFamily:"inherit"}}>{auto?"⏸ AUTO":"▶ AUTO"}</button>
              <button onClick={runScan} disabled={scanning||proxyOk===false} style={{background:scanning||proxyOk===false?"rgba(0,200,255,.08)":"linear-gradient(135deg,#00b87d,#008a5a)",border:"none",color:"#fff",padding:"9px 18px",borderRadius:4,cursor:scanning||proxyOk===false?"not-allowed":"pointer",fontSize:11,fontWeight:"bold",fontFamily:"inherit",letterSpacing:2,opacity:scanning||proxyOk===false?.6:1,boxShadow:scanning||proxyOk===false?"none":"0 0 18px rgba(0,200,125,.4)"}}>
                {scanning?"⟳ SCANNING":"⚡ SCAN NOW"}
              </button>
            </div>
          </div>
          {scanning && prog.n > 0 && (
            <div style={{marginTop:12}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#4a7a9b",marginBottom:4}}>
                <span>{prog.p} ({prog.i}/{prog.n})</span><span>{pct}%</span>
              </div>
              <div style={{height:3,background:"#0a1a24",borderRadius:2}}>
                <div style={{height:"100%",borderRadius:2,background:"linear-gradient(90deg,#00b87d,#00ff9d)",width:`${pct}%`,transition:"width .5s",boxShadow:"0 0 8px rgba(0,255,157,.6)"}}/>
              </div>
            </div>
          )}
        </div>

        {/* Stats */}
        {(deals.length>0||auctions.length>0||offers.length>0) && (
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(90px,1fr))",gap:8,marginBottom:16}}>
            {[
              {l:"BIN",    v:deals.length,    c:"#00cfff"},
              {l:"SIGNALS",v:hotCount,         c:hotCount>0?"#00ff9d":"#4a7a9b"},
              {l:"AUCTIONS",v:auctions.length, c:auctions.length>0?"#f59e0b":"#4a7a9b"},
              {l:"OFFERS", v:offers.length,    c:offers.length>0?"#818cf8":"#4a7a9b"},
              {l:"BEST ROI",v:deals.length?fR(Math.max(...deals.map(d=>d.roi))):"-",c:"#f5c842"},
            ].map(s=>(
              <div key={s.l} style={{background:"rgba(255,255,255,.03)",border:"1px solid #1a2a3a",borderRadius:6,padding:"8px 10px"}}>
                <div style={{fontSize:8,color:"#4a7a9b",letterSpacing:1,marginBottom:2}}>{s.l}</div>
                <div style={{fontSize:15,fontWeight:"bold",color:s.c}}>{s.v}</div>
              </div>
            ))}
          </div>
        )}

        <div style={{display:"grid",gridTemplateColumns:"1fr 240px",gap:14,alignItems:"start"}}>
          <div>

            {/* Auction deals */}
            {auctions.length>0 && (
              <div style={{marginBottom:16}}>
                <div style={{fontSize:10,color:"#f59e0b",letterSpacing:2,marginBottom:8}}>🔨 AUCTIONS ENDING SOON — 20%+ ROI</div>
                {auctions.map(card => {
                  const hrs = card.hoursLeft||0;
                  const urg = hrs<2?"#ff4a6a":hrs<6?"#f59e0b":"#00ff9d";
                  return (
                    <div key={card.id} style={{background:"linear-gradient(135deg,rgba(30,20,0,.95),rgba(20,12,0,.98))",border:"2px solid #f59e0b",borderRadius:6,padding:"12px 14px",marginBottom:8,boxShadow:"0 0 20px rgba(245,158,11,.2)"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                        <div style={{display:"flex",gap:6}}>
                          <span style={{fontSize:8,color:"#f59e0b",background:"rgba(245,158,11,.15)",border:"1px solid #f59e0b44",padding:"2px 6px",borderRadius:2}}>🔨 AUCTION</span>
                          <span style={{fontSize:8,color:urg,border:`1px solid ${urg}44`,padding:"2px 6px",borderRadius:2}}>⏱ {hrs}h LEFT</span>
                        </div>
                        <span style={{fontSize:10,fontWeight:"bold",color:"#f59e0b"}}>{fR(card.roi)} ROI</span>
                      </div>
                      <div style={{fontSize:9,color:"#7a6a4a",marginBottom:4}}>{SI[card.sport]} {card.player}</div>
                      <div style={{fontSize:11,color:"#b0a070",marginBottom:8,lineHeight:1.4}}>{card.listing.title}</div>
                      <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:8}}>
                        <div><div style={{fontSize:8,color:"#7a6a4a"}}>CURRENT BID</div><div style={{fontSize:13,fontWeight:"bold",color:"#fff"}}>{f$(card.listing.currentBid)}</div></div>
                        <div><div style={{fontSize:8,color:"#7a6a4a"}}>MARKET</div><div style={{fontSize:13,fontWeight:"bold",color:"#00cfff"}}>{f$(card.market)}</div></div>
                        <div><div style={{fontSize:8,color:"#7a6a4a"}}>NET</div><div style={{fontSize:13,fontWeight:"bold",color:"#c084fc"}}>{f$(card.net)}</div></div>
                        <div><div style={{fontSize:8,color:"#7a6a4a"}}>PROFIT</div><div style={{fontSize:13,fontWeight:"bold",color:"#f59e0b"}}>{f$(card.profit)}</div></div>
                      </div>
                      <a href={card.listing.url} target="_blank" rel="noreferrer" style={{display:"inline-block",background:"linear-gradient(135deg,#d97706,#b45309)",color:"#fff",textDecoration:"none",padding:"8px 16px",borderRadius:4,fontSize:10,fontWeight:"bold",fontFamily:"inherit",boxShadow:"0 0 14px rgba(245,158,11,.5)"}}>
                        🔨 BID NOW — {hrs}h LEFT ↗
                      </a>
                    </div>
                  );
                })}
              </div>
            )}

            {/* Best Offer deals */}
            {offers.length>0 && (
              <div style={{marginBottom:16}}>
                <div style={{fontSize:10,color:"#818cf8",letterSpacing:2,marginBottom:8}}>💬 BEST OFFER OPPORTUNITIES</div>
                {offers.map(card => (
                  <div key={card.id} style={{background:"linear-gradient(135deg,rgba(10,8,30,.95),rgba(6,5,20,.98))",border:"2px solid #818cf8",borderRadius:6,padding:"12px 14px",marginBottom:8,boxShadow:"0 0 20px rgba(129,140,248,.15)"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                      <span style={{fontSize:8,color:"#818cf8",background:"rgba(129,140,248,.15)",border:"1px solid #818cf844",padding:"2px 6px",borderRadius:2}}>💬 BEST OFFER</span>
                      <span style={{fontSize:10,fontWeight:"bold",color:"#818cf8"}}>{fR(card.roiTarget)} IF ACCEPTED</span>
                    </div>
                    <div style={{fontSize:9,color:"#7a7aaa",marginBottom:4}}>{SI[card.sport]} {card.player}</div>
                    <div style={{fontSize:11,color:"#9090c0",marginBottom:8,lineHeight:1.4}}>{card.listing.title}</div>
                    <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:10}}>
                      <div><div style={{fontSize:8,color:"#4a4a7a"}}>ASKING</div><div style={{fontSize:13,fontWeight:"bold",color:"#888"}}>{f$(card.listing.price)}</div></div>
                      <div><div style={{fontSize:8,color:"#4a4a7a"}}>MARKET</div><div style={{fontSize:13,fontWeight:"bold",color:"#00cfff"}}>{f$(card.market)}</div></div>
                      <div><div style={{fontSize:8,color:"#4a4a7a"}}>NET IF SOLD</div><div style={{fontSize:13,fontWeight:"bold",color:"#c084fc"}}>{f$(card.netSale)}</div></div>
                    </div>
                    <div style={{background:"rgba(129,140,248,.06)",border:"1px solid #818cf822",borderRadius:6,padding:"10px 12px",marginBottom:10}}>
                      <div style={{fontSize:8,color:"#818cf8",letterSpacing:2,marginBottom:8}}>OFFER LADDER</div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                        {[
                          {label:"AGGRESSIVE", sub:"start here",   offer:card.low,    roi:card.roiLow,    color:"#34d399"},
                          {label:"TARGET",     sub:"20% ROI",      offer:card.target, roi:card.roiTarget, color:"#818cf8"},
                          {label:"MAX OFFER",  sub:"walk away above",offer:card.max,  roi:card.roiMax,    color:"#f59e0b"},
                        ].map(o => (
                          <div key={o.label} style={{background:"rgba(0,0,0,.3)",borderRadius:4,padding:"8px 6px",textAlign:"center",border:`1px solid ${o.color}33`}}>
                            <div style={{fontSize:7,color:o.color,marginBottom:2}}>{o.label}</div>
                            <div style={{fontSize:7,color:"#4a6a7a",marginBottom:4}}>{o.sub}</div>
                            <div style={{fontSize:16,fontWeight:"bold",color:o.color}}>{f$(o.offer)}</div>
                            <div style={{fontSize:9,color:"#7a9ab0",marginTop:2}}>{fR(o.roi)}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                    <a href={card.listing.url} target="_blank" rel="noreferrer" style={{display:"inline-block",background:"linear-gradient(135deg,#6366f1,#4f46e5)",color:"#fff",textDecoration:"none",padding:"8px 16px",borderRadius:4,fontSize:10,fontWeight:"bold",fontFamily:"inherit",boxShadow:"0 0 14px rgba(129,140,248,.4)"}}>
                      💬 MAKE OFFER ↗
                    </a>
                    <span style={{fontSize:9,color:"#4a4a7a",marginLeft:10}}>Start {f$(card.low)}, max {f$(card.max)}</span>
                  </div>
                ))}
              </div>
            )}

            {/* Filter tabs */}
            {deals.length>0 && (
              <div style={{display:"flex",gap:4,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
                {["all","baseball","football","basketball","bowman"].map(s => (
                  <button key={s} onClick={()=>setTab(s)} style={{background:tab===s?(s==="all"?"#1a3a5a":`${SC[s]||"#555"}28`):"transparent",border:`1px solid ${tab===s?(s==="all"?"#00cfff":SC[s]||"#555"):"#1a2a3a"}`,color:tab===s?"#fff":"#4a7a9b",padding:"3px 8px",borderRadius:3,cursor:"pointer",fontSize:9,fontFamily:"inherit",letterSpacing:1,textTransform:"uppercase"}}>
                    {s==="all"?"ALL":s==="bowman"?"🔮 BOWMAN":(SI[s]+` ${s}`)}
                  </button>
                ))}
                <div style={{display:"flex",alignItems:"center",gap:5,marginLeft:"auto"}}>
                  <span style={{fontSize:9,color:"#4a7a9b"}}>MIN ROI</span>
                  <input type="range" min={-50} max={50} value={roiMin} onChange={e=>setRoiMin(+e.target.value)} style={{width:70,accentColor:"#00ff9d"}}/>
                  <span style={{fontSize:9,color:"#00ff9d",minWidth:32}}>{roiMin}%</span>
                </div>
              </div>
            )}

            {/* Empty state */}
            {filtered.length===0&&!scanning&&deals.length===0&&auctions.length===0&&offers.length===0 && (
              <div style={{textAlign:"center",padding:"46px 20px",border:"1px dashed #1a2a3a",borderRadius:8}}>
                <div style={{fontSize:40,marginBottom:12}}>📡</div>
                <div style={{fontSize:12,color:"#4a7a9b",lineHeight:2}}>
                  <strong style={{color:"#00ff9d"}}>SCAN NOW</strong><br/>
                  <span style={{fontSize:10}}>{TIER1.length}+{TIER2.length} targets · BIN + Auctions + Best Offer · $500 max</span>
                </div>
              </div>
            )}

            {scanning&&deals.length===0 && (
              <div style={{textAlign:"center",padding:"28px 20px",border:"1px dashed #1a3a2a",borderRadius:8,marginBottom:10}}>
                <div style={{fontSize:20,marginBottom:8,animation:"spin 2s linear infinite",display:"inline-block"}}>⟳</div>
                <div style={{fontSize:11,color:"#4a7a9b"}}>Scanning eBay...</div>
              </div>
            )}

            {/* BIN deals */}
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {filtered.map(card => {
                const hot = card.roi>=ROI_MIN, neg = card.roi<0, ib = card.sport==="bowman";
                const ac  = ib?"#a855f7":hot?"#00ff9d":neg?"#ff4a6a":"#f5c842";
                return (
                  <div key={card.id} style={{background:hot?(ib?"linear-gradient(135deg,rgba(28,0,56,.92),rgba(16,0,32,.96))":"linear-gradient(135deg,rgba(0,34,20,.92),rgba(0,18,11,.96))"):"rgba(255,255,255,.025)",border:`1px solid ${hot?(ib?"#a855f755":"#00ff9d55"):"#1a2a3a"}`,borderLeft:`3px solid ${ac}`,borderRadius:6,padding:"12px 14px",boxShadow:hot?`0 0 18px ${(ib?"rgba(168}`,85,247,.1)":"rgba(0,255,157,.08)"):"none"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                      <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                        <span style={{fontSize:8,padding:"2px 6px",borderRadius:2,background:`${SC[card.sport]||"#555"}22`,color:SC[card.sport]||"#888",border:`1px solid ${SC[card.sport]||"#555"}44`,letterSpacing:1}}>{SI[card.sport]} {card.sport?.toUpperCase()}</span>
                        <span style={{fontSize:13,fontWeight:"bold",color:"#fff"}}>{card.player}</span>
                        {card.rank>0&&<span style={{fontSize:9,color:"#a855f7",background:"rgba(168,85,247,.12)",padding:"1px 5px",borderRadius:2}}>#{card.rank}</span>}
                        <span style={{fontSize:8,color:"#00ff9d",background:"rgba(0,255,157,.08)",border:"1px solid #00ff9d33",padding:"1px 5px",borderRadius:2}}>LIVE</span>
                        {card.listing.imageMatch===true&&<span style={{fontSize:8,color:"#00ff9d",border:"1px solid #00ff9d33",padding:"1px 5px",borderRadius:2}}>✅ VERIFIED</span>}
                        {card.listing.imageMatch===null&&<span style={{fontSize:8,color:"#f5c842",border:"1px solid #f5c84233",padding:"1px 5px",borderRadius:2}}>⚠ UNVERIFIED</span>}
                      </div>
                      {hot&&<div style={{background:ib?"#a855f7":"#00ff9d",color:ib?"#fff":"#001a0d",fontSize:8,fontWeight:"bold",padding:"2px 7px",borderRadius:2,letterSpacing:2,flexShrink:0}}>{ib?"🔮 BUY":"🔥 BUY"}</div>}
                    </div>
                    {ib&&card.why&&<div style={{fontSize:9,color:"#c4b5fd",marginBottom:5,fontStyle:"italic"}}>{card.why}</div>}
                    {card.listing.image&&<img src={card.listing.image} alt="" style={{width:100,height:80,objectFit:"contain",borderRadius:4,background:"rgba(255,255,255,.05)",border:"1px solid #1a2a3a",marginBottom:6,display:"block"}} onError={e=>e.target.style.display="none"}/>}
                    <div style={{fontSize:11,color:"#7a9ab0",marginBottom:8,lineHeight:1.4,wordBreak:"break-word"}}>{card.listing.title}</div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(90px,1fr))",gap:8,marginBottom:8}}>
                      {[
                        {l:"CARD PRICE",   v:f$(card.listing.price),                          c:"#fff"},
                        {l:"BUY SHIPPING", v:card.listing.freeShipping?"FREE":f$(card.ship), c:"#aac"},
                        {l:"TOTAL COST",   v:f$(card.cost),                                   c:"#ddd"},
                        {l:"SELL MARKET",  v:f$(card.market),                                 c:"#00cfff"},
                        {l:"EBAY FEES",    v:`-${f$(card.fees}`),                               c:"#ff9d6a"},
                        {l:"SELL SHIP",    v:`-${f$(card.sellShip}`),                           c:"#ff9d6a"},
                        {l:"NET",          v:f$(card.net),                                    c:"#c084fc"},
                        {l:"PROFIT / ROI", v:f$(card.profit)+` / ${fR(card.roi}`),              c:ac},
                      ].map(f => (
                        <div key={f.l}>
                          <div style={{fontSize:7,color:"#4a7a9b",letterSpacing:1,marginBottom:1}}>{f.l}</div>
                          <div style={{fontSize:12,fontWeight:"bold",color:f.c}}>{f.v}</div>
                        </div>
                      ))}
                    </div>
                    {card.comps?.length>0&&(
                      <div style={{display:"flex",gap:3,flexWrap:"wrap",alignItems:"center",marginBottom:8}}>
                        <span style={{fontSize:8,color:"#4a7a9b"}}>COMPS:</span>
                        {card.comps.slice(0,6).map((c,i)=><span key={i} style={{fontSize:9,color:"#5a9ab0",background:"rgba(0,150,200,.1)",padding:"1px 5px",borderRadius:2}}>{f$(c)}</span>)}
                      </div>
                    )}
                    <a href={card.listing.url} target="_blank" rel="noreferrer" style={{display:"inline-block",background:hot?(ib?"linear-gradient(135deg,#7c3aed,#5b21b6)":"linear-gradient(135deg,#00b87d,#008a5a)"):"rgba(0,150,200,.15)",color:"#fff",textDecoration:"none",padding:"7px 14px",borderRadius:4,fontSize:10,fontWeight:"bold",fontFamily:"inherit",letterSpacing:1,border:hot?"none":"1px solid #1a4a6a",boxShadow:hot?`0 0 12px ${(ib?"rgba(168}`,85,247,.5)":"rgba(0,200,125,.4)"):"none"}}>
                      → VIEW LISTING ↗
                    </a>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Sidebar */}
          <div style={{position:"sticky",top:16,display:"flex",flexDirection:"column",gap:9}}>
            <div style={{background:"rgba(0,0,0,.45)",border:"1px solid #0a2a1a",borderRadius:6,overflow:"hidden"}}>
              <div style={{padding:"8px 12px",background:"rgba(0,255,157,.04)",borderBottom:"1px solid #0a2a1a",display:"flex",justifyContent:"space-between"}}>
                <span style={{fontSize:9,color:"#00ff9d",letterSpacing:2}}>SCAN LOG</span>
                {scanning&&<span style={{fontSize:8,color:"#00cfff",animation:"pulse 1s infinite"}}>● LIVE</span>}
              </div>
              <div style={{height:280,overflowY:"auto",padding:"8px 11px",display:"flex",flexDirection:"column",gap:2}}>
                {log.length===0
                  ? <div style={{fontSize:10,color:"#1a3a4a",marginTop:16,textAlign:"center"}}>Awaiting scan…</div>
                  : [...log].reverse().map((l,i)=>(
                    <div key={i} style={{fontSize:9,lineHeight:1.5,color:l.type==="alert"?"#00ff9d":l.type==="error"?"#ff6a7a":"#4a7a8a"}}>{l.msg}</div>
                  ))
                }
              </div>
            </div>

            <div style={{background:"rgba(0,0,0,.3)",border:"1px solid #1a2a3a",borderRadius:6,padding:11}}>
              <div style={{fontSize:8,color:"#00cfff",letterSpacing:2,marginBottom:7}}>HOW IT WORKS</div>
              {[
                ["BIN ROI min","10%"],
                ["Auction ROI min","20%"],
                ["Offer target","20% ROI"],
                ["eBay FVF","13.25%"],
                ["Order fee","$0.30"],
                ["Sell shipping","$5-$10"],
                ["Max buy","$500"],
                ["Tier 1 targets",`${TIER1.length]}`,
                ["Tier 2 targets",`${TIER2.length]}`,
              ].map(([k,v])=>(
                <div key={k} style={{display:"flex",justifyContent:"space-between",fontSize:9,marginBottom:4,borderBottom:"1px solid #0a1a24",paddingBottom:3}}>
                  <span style={{color:"#4a7a9b"}}>{k}</span>
                  <span style={{color:"#8aacbc"}}>{v}</span>
                </div>
              ))}
            </div>

            <div style={{background:"rgba(20,0,40,.5)",border:"1px solid #4a1a7a",borderRadius:6,padding:11}}>
              <div style={{fontSize:8,color:"#a855f7",letterSpacing:2,marginBottom:7}}>🔮 BOWMAN PROSPECTS</div>
              {[...TIER1,...TIER2].filter(t=>t.sport==="bowman").map(t=>(
                <div key={t.player} style={{marginBottom:6}}>
                  <div style={{fontSize:9,color:"#c4b5fd",fontWeight:"bold"}}>{t.player}{t.rank?` #${t.rank:""}`}</div>
                  {t.why&&<div style={{fontSize:8,color:"#7a6a8a",lineHeight:1.4}}>{t.why}</div>}
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
