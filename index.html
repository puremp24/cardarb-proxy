<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CARDARB</title>
</head>
<body style="background:#080c10;color:white;font-family:Arial">

<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<script type="text/babel">

const PROXY = "https://cardarb-proxy-production.up.railway.app";

const EBAY_FVF_RATE = 0.1325;
const EBAY_ORDER_FEE = 0.30;

function calcROI(salePrice, buyCost) {
  const fees = salePrice * EBAY_FVF_RATE + EBAY_ORDER_FEE;
  const shipping = salePrice > 50 ? 10 : 5;
  const net = salePrice - fees - shipping;
  const profit = net - buyCost;
  return profit / buyCost;
}

// 🔥 NEW OFFER ENGINE
function getMaxBuyPriceForROI(marketPrice, targetROI) {
  const fees = marketPrice * EBAY_FVF_RATE + EBAY_ORDER_FEE;
  const shipping = marketPrice > 50 ? 10 : 5;
  const net = marketPrice - fees - shipping;
  return net / (1 + targetROI);
}

function getOfferStrategy(marketPrice, targetROI) {
  const maxOffer = getMaxBuyPriceForROI(marketPrice, targetROI);
  const startOffer = maxOffer * 0.8;
  return { maxOffer, startOffer };
}

function App(){
  const [data,setData] = React.useState([]);

  async function run(){
    const r = await fetch(PROXY + "/scan?binQ=Shohei%20Ohtani%202018%20Topps%20Chrome%20PSA%2010");
    const j = await r.json();

    const deals = j.listings.map(l=>{
      const roi = calcROI(j.marketPrice, l.price);
      const offer = getOfferStrategy(j.marketPrice, 0.10);
      return {...l, roi, ...offer};
    });

    setData(deals);
  }

  return (
    <div style={{padding:20}}>
      <button onClick={run}>SCAN</button>

      {data.map(d=>(
        <div key={d.itemId} style={{border:"1px solid #333",marginTop:10,padding:10}}>
          <div>{d.title}</div>
          <div>Price: ${d.price}</div>
          <div>ROI: {(d.roi*100).toFixed(1)}%</div>
          {d.bestOffer && (
            <div>
              <div>Start Offer: ${d.startOffer.toFixed(2)}</div>
              <div>Max Offer: ${d.maxOffer.toFixed(2)}</div>
            </div>
          )}
          <a href={d.url} target="_blank">View</a>
        </div>
      ))}
    </div>
  )
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
